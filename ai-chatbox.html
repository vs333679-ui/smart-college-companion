<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #0f172a;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.chat {
    width: 350px;
    height: 500px;
    background: #1e293b;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
}
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}
.msg {
    margin: 5px;
    padding: 8px;
    border-radius: 8px;
    max-width: 70%;
}
.user { 
    background: #6366f1; 
    color: white; 
    margin-left: auto;
}
.bot { 
    background: #334155; 
    color: white; 
}

.input {
    display: flex;
}
input {
    flex: 1;
    padding: 10px;
}
button {
    padding: 10px;
    background: green;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="chat">
    <div class="messages" id="chatBox"></div>

    <div class="input">
        <input id="input" placeholder="Type..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
async function send() {
    const input = document.getElementById("input");
    const chatBox = document.getElementById("chatBox");

    const text = input.value.trim();
    if (!text) return;

    // ✅ User message
    const userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.innerText = text;
    chatBox.appendChild(userMsg);

    input.value = "";

    // ✅ Bot typing
    const botMsg = document.createElement("div");
    botMsg.className = "msg bot";
    botMsg.innerText = "Typing...";
    chatBox.appendChild(botMsg);

    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const res = await fetch("https://smart-college-companion-1.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: text })
        });

        const data = await res.json();

        console.log(data); // 🔥 debug

        // ✅ FIX
        if (data.reply) {
            botMsg.innerText = data.reply;
        } else {
            botMsg.innerText = "No response from AI 😢";
        }

    } catch (err) {
        console.error(err);
        botMsg.innerText = "Server error 😢";
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
