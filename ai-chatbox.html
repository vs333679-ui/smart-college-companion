<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat | Smart College Companion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.chat-container {
    width: 400px;
    height: 600px;
    background: #1e293b;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
}
.chat-header {
    background: #6366f1;
    padding: 15px;
    text-align: center;
}
.chat-box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}
.message {
    margin: 8px;
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
}
.user {
    background: #6366f1;
    margin-left: auto;
}
.bot {
    background: #334155;
}
.chat-input {
    display: flex;
}
.chat-input input {
    flex: 1;
    padding: 10px;
}
.chat-input button {
    padding: 10px;
    background: green;
    color: white;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="chat-header">🤖 AI Assistant</div>

<div class="chat-box" id="chatBox"></div>

<div class="chat-input">
<input type="text" id="userInput" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>
function sendMessage() {
    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");

    if (input.value.trim() === "") return;

    const userText = input.value;

    // user message
    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = userText;
    chatBox.appendChild(userMsg);

    input.value = "";

    // bot message
    const botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.innerText = "Typing...";
    chatBox.appendChild(botMsg);

    chatBox.scrollTop = chatBox.scrollHeight;

    // 🔥 REAL API CALL
    fetch("https://smart-college-companion-1.onrender.com/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: userText })
    })
    .then(res => res.json())
    .then(data => {
        botMsg.innerText = data.reply;
    })
    .catch(err => {
        botMsg.innerText = "Error connecting to AI 😢";
    });
}
</script>

</body>
</html>
