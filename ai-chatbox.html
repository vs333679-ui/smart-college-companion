<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat | Smart College Companion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-container {
    width: 400px;
    height: 600px;
    background: #1e293b;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    overflow: hidden;
}

.chat-header {
    background: linear-gradient(45deg, #6366f1, #22c55e);
    padding: 15px;
    text-align: center;
    font-weight: 600;
    font-size: 18px;
}

.chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.message {
    margin: 10px 0;
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 75%;
    animation: fadeIn 0.3s ease;
}

.user {
    background: #6366f1;
    align-self: flex-end;
}

.bot {
    background: #334155;
    align-self: flex-start;
}

.chat-input {
    display: flex;
    padding: 10px;
    background: #0f172a;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

.chat-input button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">🤖 AI Assistant</div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">Hello 👋 Ask me anything!</div>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>




<script>
async function sendMessage() {
  const input = document.getElementById("userInput");
  const messageText = input.value;
  const messages = document.getElementById("messages");

  if (!messageText) return;

  messages.innerHTML += `<div class="message user">${messageText}</div>`;
  input.value = "";

  try {
    const response = await fetch("https://api.openai.com/v1/responses", {
      method: "POST",
      headers: {
        "Authorization": "Bearer YOUR_API_KEY",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "gpt-4.1-mini",
        input: messageText
      })
    });

    const data = await response.json();

    const reply = data.output[0].content[0].text;

    messages.innerHTML += `<div class="message bot">${reply}</div>`;

  } catch (error) {
    messages.innerHTML += `<div class="message bot">Error: ${error.message}</div>`;
  }
}
</script>


</body>
</html>
