<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat | Smart College Companion</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Chat Container */
.chat-container {
    width: 400px;
    height: 600px;
    background: #1e293b;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    overflow: hidden;
}

/* Header */
.chat-header {
    background: linear-gradient(45deg, #6366f1, #22c55e);
    padding: 15px;
    text-align: center;
    font-weight: 600;
    font-size: 18px;
}

/* Messages */
.chat-box {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.message {
    margin: 10px 0;
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 75%;
    animation: fadeIn 0.3s ease;
}

.user {
    background: #6366f1;
    align-self: flex-end;
}

.bot {
    background: #334155;
    align-self: flex-start;
}

/* Input */
.chat-input {
    display: flex;
    padding: 10px;
    background: #0f172a;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

.chat-input button {
    margin-left: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.chat-input button:hover {
    background: #16a34a;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Scrollbar */
.chat-box::-webkit-scrollbar {
    width: 5px;
}
.chat-box::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="chat-container">
    
    <div class="chat-header">
        🤖 AI Assistant
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">Hello 👋 Ask me anything!</div>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
async function sendMessage() {
    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");

    if (input.value.trim() === "") return;

    // User message
    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = input.value;
    chatBox.appendChild(userMsg);

    const userText = input.value;
    input.value = "";

    chatBox.scrollTop = chatBox.scrollHeight;

    // Typing animation
    const botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.innerText = "Typing...";
    chatBox.appendChild(botMsg);

    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const res = await fetch("http://localhost:3000/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: userText })
        });

        const data = await res.json();
        botMsg.innerText = data.reply;

    } catch (error) {
        botMsg.innerText = "⚠️ Error connecting to AI server";
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
