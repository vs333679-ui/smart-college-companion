<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Timetable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
  font-family:Poppins;
  background:linear-gradient(135deg,#4a6cf7,#6a89ff);
  margin:0;
  padding:0;
  color:white;
}

/* Header */
.header{
  text-align:center;
  padding:20px;
  font-size:24px;
  font-weight:600;
}

/* Container */
.container{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  padding:20px;
}

/* Day Card */
.day{
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius:15px;
  padding:15px;
  transition:0.3s;
}

.day:hover{
  transform:scale(1.05);
}

/* Highlight Today */
.today{
  border:2px solid yellow;
}

/* Day Title */
.day h3{
  text-align:center;
  margin-bottom:10px;
}

/* Subject Box */
.subject{
  background:white;
  color:black;
  margin:5px 0;
  padding:8px;
  border-radius:8px;
  font-size:14px;
  font-weight:500;
}

/* Different Colors */
.math{background:#ff7675;color:white;}
.dbms{background:#74b9ff;color:white;}
.os{background:#55efc4;color:black;}
.cn{background:#ffeaa7;color:black;}
.lab{background:#a29bfe;color:white;}

</style>
</head>

<body>

<div class="header">📅 My Smart Timetable</div>

<div class="container">

<div class="day today">
<h3>Monday</h3>
<div class="subject math">9-10 Math</div>
<div class="subject dbms">10-11 DBMS</div>
<div class="subject os">12-1 OS</div>
<div class="subject lab">2-4 Lab</div>
</div>

<div class="day">
<h3>Tuesday</h3>
<div class="subject cn">9-10 CN</div>
<div class="subject math">10-11 Math</div>
<div class="subject dbms">12-1 DBMS</div>
<div class="subject lab">2-4 Lab</div>
</div>

<div class="day">
<h3>Wednesday</h3>
<div class="subject os">9-10 OS</div>
<div class="subject cn">10-11 CN</div>
<div class="subject math">12-1 Math</div>
<div class="subject">2-3 Project</div>
</div>

<div class="day">
<h3>Thursday</h3>
<div class="subject dbms">9-10 DBMS</div>
<div class="subject os">10-11 OS</div>
<div class="subject cn">12-1 CN</div>
<div class="subject lab">2-4 Lab</div>
</div>

<div class="day">
<h3>Friday</h3>
<div class="subject math">9-10 Math</div>
<div class="subject">10-11 Project</div>
<div class="subject os">12-1 OS</div>
<div class="subject cn">2-3 CN</div>
</div>

</div>

</body>
</html>
